<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form</title>
    <link rel="stylesheet" href="styles/form.css">
</head>
<body>
    <header>

    </header>
    <main>
        <section>
            <h3>HTML Form</h3>
            <form>
                <label for="name">Your Name: 
                    <input id="name" type="text" placeholder="Your Name">
                </label>
                <label for="email">Your Email: 
                    <input type="text" id="email" placeholder="Your Email">
                </label>
                <label for="phone">Your Phone:
                    <input type="text" id="phone" placeholder="Your Phone">
                </label>

                <fieldset>
                    <legend>Pick One Option</legend>
                    <label for="apple">
                        <input type="radio" name="phone" id="apple"> Apple
                    </label>
                    <label for="sumsung">
                        <input type="radio" name="phone" id="sumsung"> Sumsung
                    </label>
                    <label for="pixel">
                        <input type="radio" name="phone" id="pixel"> Pixel
                    </label>
                </fieldset>

                <fieldset>
                    <legend>Pic One or More Option</legend>
                    <label for="gadgets">
                        <input type="checkbox" name="gadgets" id="phone"> Phone
                    </label>
                    <label for="gadgets">
                        <input type="checkbox" name="gadgets" id="laptop"> Laptop
                    </label>
                    <label for="gadgets">
                        <input type="checkbox" name="gadgets" id="PC"> PC
                    </label>
                </fieldset>
                <input class="resub" type="reset" value="Reset">
                <input class="resub" type="submit" value="Submit">
            </form>
        </section>


        <section class="sres">
            <form>
                <table align="center" width="700" cellpadding="10">
                    <tr>
                        <td colspan="2" align="center">
                            <h1>Student Registration Form</h1>
                        </td>
                    </tr>
                    <tr>
                        <td>Student Name :</td>
                        <td>
                            <input type="text" size="21" placeholder="First Name"> - 
                            <input type="text" size="21" placeholder="Last Name">
                        </td>
                    </tr>
                    <tr>
                        <td>Father's Name :</td>
                        <td>
                            <input type="text" size="50">
                        </td>
                    </tr>
                    <tr>
                        <td>Date of Birth :</td>
                        <td>
                            <input type="text" size="3" placeholder="Day"> - 
                            <input type="text" size="3" placeholder="Month"> - 
                            <input type="text" size="8" placeholder="Year"> 
                            <i>(DD-MM-YYYY)</i>
                        </td>
                    </tr>
                    <tr>
                        <td>Mobile No. :</td>
                        <td>
                            <input type="text" size="1" value="+88"> - 
                            <input type="text" size="42">
                        </td>
                    </tr>
                    <tr>
                        <td>Email :</td>
                        <td>
                            <input type="text" size="50">
                        </td>
                    </tr>
                    <tr>
                        <td>Password :</td>
                        <td><input type="password" size="50"></td>
                    </tr>
                    <tr>
                        <td>Gender :</td>
                        <td>
                            <input type="radio" name="g"> Male
                            <input type="radio" name="g"> Female
                        </td>
                    </tr>
                    <tr>
                        <td>Department :</td>
                        <td>
                            <input type="checkbox"> CSE
                            <input type="checkbox"> EEE
                            <input type="checkbox"> BA
                            <input type="checkbox"> NFE
                        </td>
                    </tr>
                    <tr>
                        <td>Course :</td>
                        <td>
                            <select>
                                <option>------------------Select Current Courses-----------------</option>
                            
                                <option>Python</option>
                                <option>PHP</option>
                                <option>Node</option>
                                <option>Java</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>Student Photo :</td>
                        <td>
                            <input type="file">
                        </td>
                    </tr>
                    <tr>
                        <td>City :</td>
                        <td><input type="text" size="50"></td>
                    </tr>
                    <tr>
                        <td>Address :</td>
                        <td><textarea cols="48" rows="5"></textarea></td>
                    </tr>

                    <tr>
                        <td colspan="2" align="center">
                            <input type="submit" value="Register">
                        </td>
                    </tr>
                </table>
            </form>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>
